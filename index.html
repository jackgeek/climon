<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>climon — CLI Monitoring Tool</title>
  <meta name="description" content="climon — a cross-platform PTY session manager with a live web dashboard." />
  <link rel="icon" type="image/png" href="favicon.png" />
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100svh;
      background-color: #000;
      overflow: hidden;
    }

    .logo {
      display: block;
      width: min(70vw, 70vh, 640px);
      height: auto;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* GitHub "Fork me" ribbon, top right */
    .ribbon {
      position: fixed;
      top: 0;
      right: 0;
      width: 150px;
      height: 150px;
      overflow: hidden;
      z-index: 10;
    }

    .ribbon a {
      position: absolute;
      display: block;
      width: 220px;
      padding: 8px 0;
      top: 40px;
      right: -55px;
      transform: rotate(45deg);
      background-color: #4ac726;
      color: #fff;
      font: bold 13px/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      text-align: center;
      text-decoration: none;
      letter-spacing: 0.5px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.5);
      border-top: 1px solid rgba(255, 255, 255, 0.45);
      border-bottom: 1px solid rgba(0, 0, 0, 0.3);
    }

    .ribbon a:hover {
      background-color: #57d62f;
    }

    @media (max-width: 480px) {
      .ribbon {
        width: 120px;
        height: 120px;
      }
      .ribbon a {
        width: 190px;
        top: 32px;
        right: -50px;
        font-size: 11px;
      }
    }
  </style>
</head>
<body>
  <div class="ribbon">
    <a href="https://github.com/jackgeek/climon" target="_blank" rel="noopener noreferrer">Fork me on GitHub</a>
  </div>

  <img class="logo" src="logo.jpg" alt="climon — CLI Monitoring Tool" />
</body>
</html>
