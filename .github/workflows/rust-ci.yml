name: rust-ci

on:
  pull_request:
    paths: ["rust/**", "fixtures/proto/**", "fixtures/cli/**", ".github/workflows/rust-ci.yml"]
  push:
    branches: [main]
    paths: ["rust/**", "fixtures/proto/**", "fixtures/cli/**", ".github/workflows/rust-ci.yml"]

defaults:
  run:
    working-directory: rust

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    # Fail fast instead of burning up to 6h of runner time if a test deadlocks
    # (e.g. the Windows ConPTY reader-join hang fixed in #38). A full run is
    # ~1-5 min per OS, so 20 min leaves ample headroom for cold caches.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
        env:
          # GitHub-hosted Linux runners deny the controlling-terminal ioctl that
          # `setsid -c` performs, so PTY-spawning integration tests can't start
          # their child there. Disable the wrapper on Ubuntu so spawning matches
          # macOS (which has no `setsid` binary) and the tests exercise the real
          # path instead of being skipped. Empty elsewhere (a no-op).
          CLIMON_DISABLE_SETSID: ${{ matrix.os == 'ubuntu-latest' && '1' || '' }}

  licenses:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: Install cargo-deny and cargo-about
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny,cargo-about
      - run: cargo deny check
      - name: Verify THIRD-PARTY-LICENSES.md is up to date
        run: |
          cargo about generate about.hbs > /tmp/NOTICES.md
          diff -u THIRD-PARTY-LICENSES.md /tmp/NOTICES.md
