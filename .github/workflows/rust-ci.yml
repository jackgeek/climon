name: rust-ci

on:
  pull_request:
    paths:
      - "rust/**"
      - "fixtures/proto/**"
      - "fixtures/cli/**"
      - "scripts/**"
      - "src/**"
      - "tests/upgrade-harness.test.ts"
      - "tests/windows-installer-package.test.ts"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/release.yml"
      - ".github/workflows/rust-ci.yml"
  push:
    branches: [main]
    paths:
      - "rust/**"
      - "fixtures/proto/**"
      - "fixtures/cli/**"
      - "scripts/**"
      - "src/**"
      - "tests/upgrade-harness.test.ts"
      - "tests/windows-installer-package.test.ts"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/release.yml"
      - ".github/workflows/rust-ci.yml"

defaults:
  run:
    working-directory: rust

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    # The migration harness performs multiple release builds, including the
    # actual v3.1.3 source in a detached worktree, after the normal Rust suite.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: Install Bun dependencies
        working-directory: .
        run: bun install --frozen-lockfile
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
        env:
          # GitHub-hosted Linux runners deny the controlling-terminal ioctl that
          # `setsid -c` performs, so PTY-spawning integration tests can't start
          # their child there. Disable the wrapper on Ubuntu so spawning matches
          # macOS (which has no `setsid` binary) and the tests exercise the real
          # path instead of being skipped. Empty elsewhere (a no-op).
          CLIMON_DISABLE_SETSID: ${{ matrix.os == 'ubuntu-latest' && '1' || '' }}
      - name: Upgrade harness unit tests
        working-directory: .
        run: bun test tests/upgrade-harness.test.ts tests/windows-installer-package.test.ts
      - name: Cross-platform legacy update migration
        working-directory: .
        run: bun scripts/upgrade-test-harness.ts

  licenses:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: Install cargo-deny and cargo-about
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny,cargo-about
      - run: cargo deny check
      - name: Verify THIRD-PARTY-LICENSES.md is up to date
        run: |
          cargo about generate about.hbs > /tmp/NOTICES.md
          diff -u THIRD-PARTY-LICENSES.md /tmp/NOTICES.md
