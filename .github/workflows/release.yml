name: Release

# Automatically bump the patch version (and tag it) whenever `main` is updated —
# i.e. when a pull request is merged. This replaces the old local husky
# `post-merge` hook so the bump happens for every merge style (merge commit,
# squash, or rebase), not just local `--no-ff` merges.
on:
  push:
    branches: [main]

# Never run two releases against `main` at once.
concurrency:
  group: release-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Skip the bump commit the release itself pushes, otherwise it would loop.
    if: ${{ !startsWith(github.event.head_commit.message, 'chore(release):') }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use a token that is allowed to push to `main`. GITHUB_TOKEN works
          # unless branch protection forbids direct pushes; in that case set a
          # PAT/app token in the RELEASE_TOKEN secret and it is used instead.
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Install Bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Detect existing release tag
        id: existing-release
        run: |
          set -euo pipefail
          next_tag="$(bun -e '
            const { readFileSync } = require("node:fs");
            const pkg = JSON.parse(readFileSync("package.json", "utf8"));
            const match = /^(\d+)\.(\d+)\.(\d+)$/.exec(pkg.version);
            if (!match) throw new Error(`Invalid package version: ${pkg.version}`);
            console.log(`v${match[1]}.${match[2]}.${Number(match[3]) + 1}`);
          ')"
          git fetch --tags --force origin
          if git rev-parse "refs/tags/$next_tag" >/dev/null 2>&1; then
            echo "tag=$next_tag" >> "$GITHUB_OUTPUT"
          else
            echo "tag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out existing release tag
        if: ${{ steps.existing-release.outputs.tag != '' }}
        run: git checkout "${{ steps.existing-release.outputs.tag }}"

      - name: Patch release (bump + commit + tag)
        if: ${{ steps.existing-release.outputs.tag == '' }}
        run: bun run release

      - name: Capture release tag
        id: release-tag
        env:
          EXISTING_TAG: ${{ steps.existing-release.outputs.tag }}
        run: |
          set -euo pipefail
          if [ -n "$EXISTING_TAG" ]; then
            echo "tag=$EXISTING_TAG" >> "$GITHUB_OUTPUT"
          else
            tag="$(git describe --tags --exact-match HEAD)"
            echo "tag=$tag" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compile release binaries
        run: bun run compile

      - name: Verify release artifacts
        run: |
          set -euo pipefail
          expected=(
            dist/climon-linux-x64.zip
            dist/climon-linux-arm64.zip
            dist/climon-darwin-x64.zip
            dist/climon-darwin-arm64.zip
            dist/climon-windows-x64.zip
          )

          for file in "${expected[@]}"; do
            test -f "$file" || { echo "Missing artifact: $file"; exit 1; }
          done

          actual_count="$(find dist -maxdepth 1 -type f -name 'climon-*.zip' | wc -l | tr -d ' ')"
          test "$actual_count" = "${#expected[@]}"

      - name: Push bump commit and tag
        if: ${{ steps.existing-release.outputs.tag == '' }}
        run: git push --follow-tags origin HEAD:main

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release-tag.outputs.tag }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/*.zip --clobber
          else
            gh release create "$TAG" dist/*.zip --title "$TAG" --notes "Release $TAG"
          fi
