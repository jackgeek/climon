name: Release

# Tag-driven release. Under the gitflow model a release is prepared on a
# `release/*` (or `hotfix/*`) branch: the version + CLI fixtures are bumped there
# with `bun run release`, the branch is merged into `main` with a real merge
# commit, and then a `vX.Y.Z` tag is pushed at the merge commit. Pushing that tag
# is the single, explicit signal that ships a release — merging to `main` alone
# no longer cuts one. See docs/cutting-a-release.md for the full runbook.
#
# The shipped client is the Rust `climon` binary. It is cross-compiled for every
# target on a native runner in the `build-client` matrix, then the `release` job
# assembles the five zips (with the Bun server + climon-alpha sentinel), signs,
# verifies, and publishes them. Finally `backmerge` opens a `main` -> `dev` PR so
# the version bump flows back to the integration branch.
on:
  push:
    tags:
      - "v*"

# Never run two releases for the same tag at once.
concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  # Derive the release version from the pushed tag and fail fast if the working
  # tree at that tag disagrees with it (a mistyped tag or a forgotten
  # `bun run release`). The tag is the source of truth for the version; the job
  # only proves package.json + the CLI fixtures already match it.
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.version }}
      tag: ${{ github.ref_name }}
    steps:
      # Fail the release immediately if the Application Insights connection string
      # secret is missing, so we never publish binaries with an empty embedded
      # telemetry endpoint by accident. `secrets` is available in step `env:`, so
      # we map it and check for emptiness (the value stays masked in logs). Set the
      # `APPLICATIONINSIGHTS_CONNECTION_STRING` repository secret to unblock.
      - name: Require telemetry connection secret
        env:
          APPLICATIONINSIGHTS_CONNECTION_STRING: ${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING }}
        run: |
          if [ -z "${APPLICATIONINSIGHTS_CONNECTION_STRING}" ]; then
            echo "::error::APPLICATIONINSIGHTS_CONNECTION_STRING secret is not set. Releases must embed the App Insights connection string; add the repository secret before releasing (see docs/logging.md)."
            exit 1
          fi
          echo "Telemetry connection secret present; release may proceed."

      - uses: actions/checkout@v4

      - name: Install Bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

      - name: Derive and verify release version from tag
        id: compute
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          case "$tag" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *)
              echo "::error::Tag '$tag' is not a vX.Y.Z release tag."
              exit 1
              ;;
          esac
          version="${tag#v}"

          pkg_version="$(bun -e '
            const { readFileSync } = require("node:fs");
            const pkg = JSON.parse(readFileSync("package.json", "utf8"));
            if (!/^\d+\.\d+\.\d+$/.test(pkg.version)) {
              throw new Error(`Invalid package version: ${pkg.version}`);
            }
            console.log(pkg.version);
          ')"

          if [ "$pkg_version" != "$version" ]; then
            echo "::error::Tag '$tag' does not match package.json version '$pkg_version'. Bump the version on the release/hotfix branch with 'bun run release' and tag the merged commit (see docs/cutting-a-release.md)."
            exit 1
          fi

          # The golden CLI fixtures embed `climon v<semver>` on line 1 and are
          # asserted byte-for-byte by the client tests. Confirm they match the tag
          # so we never ship binaries whose --version disagrees with the release.
          for fixture in fixtures/cli/version.txt fixtures/cli/help.txt; do
            if ! head -n1 "$fixture" | grep -q "climon v$version"; then
              echo "::error::$fixture does not embed 'climon v$version' on line 1. Re-run 'bun run release' so the fixtures match the tag."
              exit 1
            fi
          done

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Releasing $tag (version $version)."

  # Fail fast on the canonical repo if the update signing key is missing or does
  # not correspond to the public key embedded in the client (src/update/pubkey.ts).
  # Signing is otherwise a late, skippable step: an absent/mismatched key would
  # ship an unverifiable release and break `climon --update`. Gating here — before
  # any build/publish side effect — prevents that. Forks (any other repository)
  # skip the check so keyless releases still build.
  verify-signing-key:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        if: ${{ github.repository == 'jackgeek/climon' }}
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

      - name: Verify signing key matches embedded public key
        if: ${{ github.repository == 'jackgeek/climon' }}
        env:
          CLIMON_UPDATE_PRIVATE_KEY: ${{ secrets.CLIMON_UPDATE_PRIVATE_KEY }}
        run: bun run verify-signing-key

  # Cross-compile the Rust client for every target on a native runner. Each leg
  # uploads its `install`/`install.exe` binary as an artifact for the assemble
  # step. CLIMON_VERSION pins the tagged version into the binary (build.rs).
  build-client:
    needs: [version, verify-signing-key]
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            cross: false
          - platform: linux-arm64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            cross: true
          - platform: darwin-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            cross: false
          - platform: darwin-x64
            os: macos-latest
            target: x86_64-apple-darwin
            cross: false
          - platform: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            cross: false
    runs-on: ${{ matrix.os }}
    env:
      CLIMON_VERSION: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      # linux-arm64 is cross-compiled on the x86_64 ubuntu runner. cargo-zigbuild
      # uses zig as the cross linker so we don't need a GCC cross-toolchain.

      - name: Setup Zig (cross targets)
        if: ${{ matrix.cross }}
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild (cross targets)
        if: ${{ matrix.cross }}
        run: cargo install --locked cargo-zigbuild

      - name: Build climon client (native)
        if: ${{ !matrix.cross }}
        working-directory: rust
        run: cargo build --release -p climon-cli --target ${{ matrix.target }}

      - name: Build climon client (cross via zigbuild)
        if: ${{ matrix.cross }}
        working-directory: rust
        run: cargo zigbuild --release -p climon-cli --target ${{ matrix.target }}

      # Stage the binary under the bare `install` name the packager expects.
      - name: Stage install binary (Unix)
        if: ${{ matrix.platform != 'windows-x64' }}
        working-directory: rust
        run: |
          set -euo pipefail
          mkdir -p staged
          cp "target/${{ matrix.target }}/release/climon" "staged/install"

      - name: Stage install binary (Windows)
        if: ${{ matrix.platform == 'windows-x64' }}
        working-directory: rust
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staged | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/climon.exe" "staged/install.exe"

      - name: Upload client artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-client-${{ matrix.platform }}
          path: rust/staged/*
          if-no-files-found: error
          retention-days: 1

  release:
    needs: [version, build-client, verify-signing-key]
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ needs.version.outputs.tag }}
      # Non-sensitive boolean mapped at job level so the `if:` guards on the
      # signing steps can read it (step-level env is not visible to a step's own
      # `if`, and the `secrets` context is unavailable in step `if:`). The actual
      # private key is scoped to ONLY the signing step below to keep it out of the
      # environment of `curl | bash` and `bun install` (postinstall) steps. Empty
      # until the signing key secret is provisioned, which keeps releases working
      # meanwhile.
      HAS_SIGNING_KEY: ${{ secrets.CLIMON_UPDATE_PRIVATE_KEY != '' && 'yes' || '' }}
    steps:
      # The push event already checks out the tagged commit; no bump, no push to
      # main. The tag was created on the merged release/hotfix commit, so this
      # tree already carries the bumped version + fixtures verified by `version`.
      - uses: actions/checkout@v4

      - name: Install Bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

      - name: Download prebuilt Rust clients
        uses: actions/download-artifact@v4
        with:
          pattern: rust-client-*
          path: dist/.rust-clients-artifacts

      # download-artifact lays out artifacts as
      # dist/.rust-clients-artifacts/rust-client-<platform>/install[.exe];
      # reshape into dist/.rust-clients/<platform>/install[.exe] for the packager.
      - name: Stage Rust clients for packaging
        run: |
          set -euo pipefail
          for dir in dist/.rust-clients-artifacts/rust-client-*; do
            platform="$(basename "$dir" | sed 's/^rust-client-//')"
            mkdir -p "dist/.rust-clients/$platform"
            cp "$dir"/* "dist/.rust-clients/$platform/"
          done
          rm -rf dist/.rust-clients-artifacts
          ls -R dist/.rust-clients

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Assemble release binaries
        env:
          CLIMON_ASSEMBLE: "1"
          # Baked into the compiled climon-server via bun --define so it never
          # lives in source. Absent (forks / no secret) => empty embedded string
          # => no telemetry endpoint shipped. Servers still must opt in via
          # `telemetry.enabled` for anything to be sent.
          APPLICATIONINSIGHTS_CONNECTION_STRING: ${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING }}
        run: bun run compile

      - name: Sign release artifacts + emit manifest
        if: ${{ env.HAS_SIGNING_KEY != '' }}
        env:
          CLIMON_UPDATE_PRIVATE_KEY: ${{ secrets.CLIMON_UPDATE_PRIVATE_KEY }}
          RELEASE_VERSION: ${{ env.RELEASE_TAG }}
          RELEASE_BASE_URL: https://github.com/jackgeek/climon/releases/download/${{ env.RELEASE_TAG }}
        run: bun run sign-release

      - name: Verify release artifacts
        run: |
          set -euo pipefail
          expected=(
            dist/climon-linux-x64.zip
            dist/climon-linux-arm64.zip
            dist/climon-darwin-x64.zip
            dist/climon-darwin-arm64.zip
            dist/climon-windows-x64.zip
          )

          for file in "${expected[@]}"; do
            test -f "$file" || { echo "Missing artifact: $file"; exit 1; }
          done

          actual_count="$(find dist -maxdepth 1 -type f -name 'climon-*.zip' | wc -l | tr -d ' ')"
          test "$actual_count" = "${#expected[@]}"

      - name: Verify signatures present
        if: ${{ env.HAS_SIGNING_KEY != '' }}
        run: |
          set -euo pipefail
          test -f dist/manifest.json
          for z in dist/climon-*.zip; do test -f "$z.sig"; done

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          TAG: ${{ env.RELEASE_TAG }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          # Ship the signed manifest + detached signatures alongside the zips so
          # `climon --update` can fetch them from this repo's latest release. The
          # sig/manifest globs are empty on forks without the signing key.
          assets=(dist/climon-*.zip dist/climon-*.zip.sig)
          [ -f dist/manifest.json ] && assets+=(dist/manifest.json)
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${assets[@]}" --clobber
          else
            gh release create "$TAG" "${assets[@]}" --title "$TAG" --notes "Release $TAG"
          fi

  # Back-merge the release into the integration branch. The version bump + fixture
  # commit landed on `main` (via the release/hotfix merge); this opens a PR so it
  # flows back to `dev` and the two branches keep a shared ancestor. The PR is
  # intentionally NOT auto-merged — a human reviews and merges it (with a real
  # merge commit, never a squash) so back-merge history stays clean.
  backmerge:
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Open main -> dev back-merge PR
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git fetch origin main dev --quiet

          # Nothing to do if main is already an ancestor of dev (dev already
          # contains the release commit, e.g. a docs-only or re-run scenario).
          if git merge-base --is-ancestor origin/main origin/dev; then
            echo "dev already contains main; no back-merge PR needed."
            exit 0
          fi

          # Reuse an existing open back-merge PR if one is already there.
          existing="$(gh pr list --base dev --head main --state open --json number --jq '.[0].number' || true)"
          if [ -n "$existing" ] && [ "$existing" != "null" ]; then
            echo "Back-merge PR #$existing (main -> dev) already open; leaving it for review."
            exit 0
          fi

          body="$(printf '%s\n\n%s\n' \
            "Automated back-merge of the \`${RELEASE_TAG}\` release from \`main\` into \`dev\`, carrying the version + CLI-fixture bump back to the integration branch." \
            "Merge this with a **real merge commit** (\`gh pr merge --merge\`), never a squash or rebase, so \`main\` and \`dev\` keep a shared ancestor. See docs/cutting-a-release.md.")"

          gh pr create \
            --base dev \
            --head main \
            --title "chore: back-merge ${RELEASE_TAG} (main -> dev)" \
            --body "$body"
