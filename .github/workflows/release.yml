name: Release

# Automatically bump the patch version (and tag it) whenever `main` is updated —
# i.e. when a pull request is merged. This replaces the old local husky
# `post-merge` hook so the bump happens for every merge style (merge commit,
# squash, or rebase), not just local `--no-ff` merges.
#
# The shipped client is the Rust `climon` binary. It is cross-compiled for every
# target on a native runner in the `build-client` matrix, then the `release` job
# assembles the five zips (with the Bun server + climon-alpha sentinel), signs,
# encrypts, verifies, and publishes them.
on:
  push:
    branches: [main]

# Never run two releases against `main` at once.
concurrency:
  group: release-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # Compute the release version up front so the client matrix embeds the bumped
  # version (the bump commit itself only lands in the `release` job).
  version:
    runs-on: ubuntu-latest
    # Skip the bump commit the release itself pushes, otherwise it would loop.
    if: ${{ !startsWith(github.event.head_commit.message, 'chore(release):') }}
    outputs:
      version: ${{ steps.compute.outputs.version }}
      tag: ${{ steps.compute.outputs.tag }}
      existing: ${{ steps.compute.outputs.existing }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

      - name: Compute next release version
        id: compute
        run: |
          set -euo pipefail
          next_tag="$(bun -e '
            const { readFileSync } = require("node:fs");
            const pkg = JSON.parse(readFileSync("package.json", "utf8"));
            const match = /^(\d+)\.(\d+)\.(\d+)$/.exec(pkg.version);
            if (!match) throw new Error(`Invalid package version: ${pkg.version}`);
            console.log(`v${match[1]}.${match[2]}.${Number(match[3]) + 1}`);
          ')"
          git fetch --tags --force origin
          if git rev-parse "refs/tags/$next_tag" >/dev/null 2>&1; then
            existing="$next_tag"
          else
            existing=""
          fi
          echo "tag=$next_tag" >> "$GITHUB_OUTPUT"
          echo "version=${next_tag#v}" >> "$GITHUB_OUTPUT"
          echo "existing=$existing" >> "$GITHUB_OUTPUT"

  # Cross-compile the Rust client for every target on a native runner. Each leg
  # uploads its `install`/`install.exe` binary as an artifact for the assemble
  # step. CLIMON_VERSION pins the bumped version into the binary (build.rs).
  build-client:
    needs: version
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            cross: false
          - platform: linux-arm64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            cross: true
          - platform: darwin-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            cross: false
          - platform: darwin-x64
            os: macos-latest
            target: x86_64-apple-darwin
            cross: false
          - platform: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            cross: false
    runs-on: ${{ matrix.os }}
    env:
      CLIMON_VERSION: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      # linux-arm64 is cross-compiled on the x86_64 ubuntu runner. cargo-zigbuild
      # uses zig as the cross linker so we don't need a GCC cross-toolchain.

      - name: Setup Zig (cross targets)
        if: ${{ matrix.cross }}
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild (cross targets)
        if: ${{ matrix.cross }}
        run: cargo install --locked cargo-zigbuild

      - name: Build climon client (native)
        if: ${{ !matrix.cross }}
        working-directory: rust
        # Baked into gated builds by climon-update/build.rs (XOR-obfuscated).
        # Empty when the secret is absent (forks) -> no embedded password.
        # Scoped to the build step only, matching the signing-key pattern below.
        env:
          CLIMON_DISTRIBUTION_PASSWORD: ${{ secrets.CLIMON_DISTRIBUTION_PASSWORD }}
        run: cargo build --release -p climon-cli --target ${{ matrix.target }}

      - name: Build climon client (cross via zigbuild)
        if: ${{ matrix.cross }}
        working-directory: rust
        # Baked into gated builds by climon-update/build.rs (XOR-obfuscated).
        # Empty when the secret is absent (forks) -> no embedded password.
        # Scoped to the build step only, matching the signing-key pattern below.
        env:
          CLIMON_DISTRIBUTION_PASSWORD: ${{ secrets.CLIMON_DISTRIBUTION_PASSWORD }}
        run: cargo zigbuild --release -p climon-cli --target ${{ matrix.target }}

      # Stage the binary under the bare `install` name the packager expects.
      - name: Stage install binary (Unix)
        if: ${{ matrix.platform != 'windows-x64' }}
        working-directory: rust
        run: |
          set -euo pipefail
          mkdir -p staged
          cp "target/${{ matrix.target }}/release/climon" "staged/install"

      - name: Stage install binary (Windows)
        if: ${{ matrix.platform == 'windows-x64' }}
        working-directory: rust
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staged | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/climon.exe" "staged/install.exe"

      - name: Upload client artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-client-${{ matrix.platform }}
          path: rust/staged/*
          if-no-files-found: error
          retention-days: 1

  release:
    needs: [version, build-client]
    runs-on: ubuntu-latest
    env:
      # Non-sensitive boolean mapped at job level so the `if:` guards on the
      # signing steps can read it (step-level env is not visible to a step's own
      # `if`, and the `secrets` context is unavailable in step `if:`). The actual
      # private key is scoped to ONLY the signing step below to keep it out of the
      # environment of `curl | bash` and `bun install` (postinstall) steps. Empty
      # until the signing key secret is provisioned, which keeps releases working
      # meanwhile.
      HAS_SIGNING_KEY: ${{ secrets.CLIMON_UPDATE_PRIVATE_KEY != '' && 'yes' || '' }}
      # Set only when the signing key, encryption password, and public-repo
      # publish token all exist, so encrypted publishing is all-or-nothing.
      HAS_DISTRIBUTION_KEY: ${{ secrets.CLIMON_UPDATE_PRIVATE_KEY != '' && secrets.CLIMON_DISTRIBUTION_PASSWORD != '' && secrets.RELEASES_PUBLISH_TOKEN != '' && 'yes' || '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use a token that is allowed to push to `main`. GITHUB_TOKEN works
          # unless branch protection forbids direct pushes; in that case set a
          # PAT/app token in the RELEASE_TOKEN secret and it is used instead.
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Install Bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Check out existing release tag
        if: ${{ needs.version.outputs.existing != '' }}
        run: |
          git fetch --tags --force origin
          git checkout "${{ needs.version.outputs.existing }}"

      - name: Patch release (bump + commit + tag)
        if: ${{ needs.version.outputs.existing == '' }}
        run: bun run release

      - name: Capture release tag
        id: release-tag
        env:
          EXISTING_TAG: ${{ needs.version.outputs.existing }}
        run: |
          set -euo pipefail
          if [ -n "$EXISTING_TAG" ]; then
            echo "tag=$EXISTING_TAG" >> "$GITHUB_OUTPUT"
          else
            tag="$(git describe --tags --exact-match HEAD)"
            echo "tag=$tag" >> "$GITHUB_OUTPUT"
          fi

      - name: Download prebuilt Rust clients
        uses: actions/download-artifact@v4
        with:
          pattern: rust-client-*
          path: dist/.rust-clients-artifacts

      # download-artifact lays out artifacts as
      # dist/.rust-clients-artifacts/rust-client-<platform>/install[.exe];
      # reshape into dist/.rust-clients/<platform>/install[.exe] for the packager.
      - name: Stage Rust clients for packaging
        run: |
          set -euo pipefail
          for dir in dist/.rust-clients-artifacts/rust-client-*; do
            platform="$(basename "$dir" | sed 's/^rust-client-//')"
            mkdir -p "dist/.rust-clients/$platform"
            cp "$dir"/* "dist/.rust-clients/$platform/"
          done
          rm -rf dist/.rust-clients-artifacts
          ls -R dist/.rust-clients

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Assemble release binaries
        env:
          CLIMON_ASSEMBLE: "1"
        run: bun run compile

      - name: Sign release artifacts + emit manifest
        if: ${{ env.HAS_SIGNING_KEY != '' }}
        env:
          CLIMON_UPDATE_PRIVATE_KEY: ${{ secrets.CLIMON_UPDATE_PRIVATE_KEY }}
          RELEASE_VERSION: ${{ steps.release-tag.outputs.tag }}
          RELEASE_BASE_URL: https://github.com/jackgeek/climon-releases/releases/download/${{ steps.release-tag.outputs.tag }}
        run: bun run sign-release

      - name: Encrypt release artifacts
        if: ${{ env.HAS_DISTRIBUTION_KEY != '' }}
        env:
          CLIMON_DISTRIBUTION_PASSWORD: ${{ secrets.CLIMON_DISTRIBUTION_PASSWORD }}
        run: bun run encrypt-release

      - name: Verify release artifacts
        run: |
          set -euo pipefail
          expected=(
            dist/climon-linux-x64.zip
            dist/climon-linux-arm64.zip
            dist/climon-darwin-x64.zip
            dist/climon-darwin-arm64.zip
            dist/climon-windows-x64.zip
          )

          for file in "${expected[@]}"; do
            test -f "$file" || { echo "Missing artifact: $file"; exit 1; }
          done

          actual_count="$(find dist -maxdepth 1 -type f -name 'climon-*.zip' | wc -l | tr -d ' ')"
          test "$actual_count" = "${#expected[@]}"

      - name: Verify signatures present
        if: ${{ env.HAS_SIGNING_KEY != '' }}
        run: |
          set -euo pipefail
          test -f dist/manifest.json
          for z in dist/climon-*.zip; do test -f "$z.sig"; done

      - name: Verify encrypted artifacts present
        if: ${{ env.HAS_DISTRIBUTION_KEY != '' }}
        run: |
          set -euo pipefail
          for z in dist/climon-*.zip; do test -f "$z.enc"; done

      - name: Push bump commit and tag
        if: ${{ needs.version.outputs.existing == '' }}
        run: git push --follow-tags origin HEAD:main

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release-tag.outputs.tag }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/*.zip --clobber
          else
            gh release create "$TAG" dist/*.zip --title "$TAG" --notes "Release $TAG"
          fi

      - name: Publish encrypted update artifacts to public repo
        if: ${{ env.HAS_DISTRIBUTION_KEY != '' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASES_PUBLISH_TOKEN }}
          TAG: ${{ steps.release-tag.outputs.tag }}
          REPO: jackgeek/climon-releases
        run: |
          set -euo pipefail
          shopt -s failglob
          assets=(dist/climon-*.zip.enc dist/climon-*.zip.sig dist/manifest.json)
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release upload "$TAG" "${assets[@]}" --repo "$REPO" --clobber
          else
            gh release create "$TAG" "${assets[@]}" --repo "$REPO" \
              --title "$TAG" --notes "Release $TAG"
          fi
