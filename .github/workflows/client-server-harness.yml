name: Client/server harness

on:
  workflow_dispatch: {}
  pull_request:
    paths:
      - "harness/**"
      - "docs/manual-tests/**"
      - "rust/**"
      - "src/server.ts"
      - "src/server/**"
      - "src/web/**"
      - "scripts/server-build.ts"
      - "scripts/compile.ts"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/client-server-harness.yml"

jobs:
  smoke:
    name: smoke (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-latest
          - platform: macos
            os: macos-latest
          - platform: windows
            os: windows-latest
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: bun install --frozen-lockfile
        name: Install dependencies

      - name: Install Chromium and Linux browser dependencies
        if: runner.os == 'Linux'
        run: npx playwright install --with-deps chromium

      - name: Install Chromium
        if: runner.os != 'Linux'
        run: npx playwright install chromium

      - name: Run harness
        run: bun run test:harness:smoke
        env:
          CLIMON_HARNESS_ARTIFACT_DIR: .test-tmp/harness/${{ matrix.platform }}
          CLIMON_DISABLE_SETSID: ${{ runner.os == 'Linux' && '1' || '' }}

      - name: Upload harness evidence
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: client-server-harness-${{ matrix.platform }}
          path: .test-tmp/harness/${{ matrix.platform }}
          if-no-files-found: error

  aggregate:
    needs: smoke
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - run: bun install --frozen-lockfile
        name: Install dependencies

      - uses: actions/download-artifact@v4
        with:
          pattern: client-server-harness-*
          path: .test-tmp/harness-results

      - name: Aggregate cross-platform results
        run: bun run harness:aggregate -- .test-tmp/harness-results docs/manual-tests smoke

      - name: Publish aggregate summary
        if: always()
        run: |
          if [ -f .test-tmp/harness-results/summary.md ]; then
            cat .test-tmp/harness-results/summary.md >> $GITHUB_STEP_SUMMARY
          else
            printf '## Aggregate summary\n\n> Aggregation failed — no summary\.md was produced\.\n' >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload aggregate summary
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: client-server-harness-summary
          path: |
            .test-tmp/harness-results/summary.json
            .test-tmp/harness-results/summary.md
          if-no-files-found: warn
