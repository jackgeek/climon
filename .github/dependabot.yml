version: 2
updates:
  # Bun (JavaScript/TypeScript) dependencies from the root package.json/bun.lock
  - package-ecosystem: "bun"
    directory: "/"
    # Feature work lands on dev; targeting dev avoids conflicts and prevents
    # merges into main (which triggers the Release workflow).
    target-branch: "dev"
    schedule:
      interval: "daily"
    # Group tightly-coupled families so siblings bump together in one PR to
    # mutually-compatible versions. This prevents "coupled sibling left behind"
    # mismatches such as @xterm/xterm 6 landing while @xterm/addon-fit stays on
    # 0.10 (peerDep xterm ^5), which silently broke terminal fit() at runtime.
    groups:
      xterm:
        patterns:
          - "@xterm/*"
      fluentui:
        patterns:
          - "@fluentui/*"
      react:
        patterns:
          - "react"
          - "react-dom"

  # Rust (Cargo) dependencies for the client workspace under rust/
  - package-ecosystem: "cargo"
    directory: "/rust"
    target-branch: "dev"
    schedule:
      interval: "daily"
